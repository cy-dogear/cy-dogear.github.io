<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Dot2Dot Checking...</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f7f6f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
        }
        .container { text-align: center; padding: 2rem; }
        .big-text { font-size: 3rem; font-weight: 600; color: #2c5f2d; }
        .countdown { font-size: 1.2rem; color: #666; margin-top: 1rem; }
        .status { font-size: 0.9rem; color: #999; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="big-text">⏳ 检测中...</div>
        <div class="countdown">正在确认目标服务状态</div>
        <div class="status" id="status"></div>
    </div>

    <script>
        // ==================== 全局配置 ====================
        const URL_1ST = 'http://t7fea69d.natappfree.cc';
        const URL_2ND = 'https://cy-dogear.github.io/dot2dot/helpme.html';
        const URL_3RD = 'https://cy-dogear.github.io/dot2dot/index.html';

        const VERIFY_1 = 'not found';
        const VERIFY_2 = 'Dot2Dot-Login-Page-Check';

        // >>> 插入1：限制检查（放在这里）<<<
        let loopCount = parseInt(sessionStorage.getItem('dot2dot_loop') || '0');
        if (loopCount >= 2) {
            targetUrl = URL_2ND;
            sessionStorage.removeItem('dot2dot_loop');
            window.location.href = targetUrl;
            throw new Error('Loop limit reached');
        }
                
        const FETCH_TIMEOUT = 2000;
        const REDIRECT_DELAY = 2000;
        // ==================== 配置结束 ====================

        const statusEl = document.getElementById('status');
        
        function updateStatus(msg) {
            if (statusEl) statusEl.textContent = msg;
            console.log(msg);
        }
        
        async function checkUrl(url, verifyString) {
            updateStatus(`🔍 检测: ${url}`);
            
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    signal: AbortSignal.timeout(FETCH_TIMEOUT),
                    cache: 'no-store'
                });
                
                if (!response.ok) {
                    updateStatus(`❌ HTTP ${response.status}`);
                    return false;
                }
                
                const html = await response.text();
                const isValid = html.includes(verifyString);
                
                updateStatus(isValid ? `✅ 验证通过` : `⚠️ 未找到验证字符串`);
                return isValid;
                
            } catch (err) {
                updateStatus(`❌ ${err.name === 'TimeoutError' ? '超时' : err.message}`);
                return false;
            }
        }
        
        (async function() {
            let targetUrl = null;
            
            if (await checkUrl(URL_1ST, VERIFY_1)) targetUrl = URL_2ND;
            else if (await checkUrl(URL_1ST, VERIFY_2)) targetUrl = URL_1ST;
            else {
                // >>> 插入2：循环计数（放在 else 里，跳转前）<<<
                sessionStorage.setItem('dot2dot_loop', loopCount + 1);
                targetUrl = URL_3RD;
                }

            window.location.href = targetUrl;
            
            setTimeout(() => {
                if (targetUrl) {
                    window.location.href = targetUrl;
                } else {
                    updateStatus('💀 所有服务均不可用');
                    statusEl.style.color = '#c0392b';
                }
            }, REDIRECT_DELAY);
        })();
    </script>
</body>
</html>
