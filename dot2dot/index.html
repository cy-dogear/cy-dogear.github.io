<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>连接中转 · Dot2Dot</title>
    <style>
        /* 极简加载样式，仅提升视觉反馈，不影响核心跳转逻辑 */
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f7f6f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
            text-align: center;
        }
        .message-card {
            background: white;
            border-radius: 28px;
            padding: 2rem 2rem 2rem 2rem;
            max-width: 460px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.03), 0 0 0 1px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
        }
        .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 2px solid #e2e0da;
            border-top-color: #2c5f2d;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        p {
            color: #2d3e2b;
            font-size: 0.95rem;
            margin: 0.5rem 0 0 0;
            letter-spacing: -0.2px;
        }
        .dot {
            color: #8b9a6e;
            font-size: 0.8rem;
            margin-top: 1rem;
        }
        a {
            color: #2c5f2d;
            text-decoration: none;
            border-bottom: 1px dotted #b9cfaa;
        }
    </style>
</head>
<body>
<div class="message-card" id="statusBox">
    <div class="spinner" id="loadingSpinner"></div>
    <p id="statusText">⚡ 正在检测主服务器连通性 …</p>
    <div class="dot" id="detailHint">稍等片刻，自动为您选择可达的入口</div>
</div>

<script>
    (function() {
        // ----- 配置区域 -----
        // 主服务器地址（尝试检测的终点）
        const PRIMARY_URL = 'http://m3783e46.natappfree.cc';
        // 备用 fallback 地址：当主服务器明显异常（无法连接 / 超时 / 非正常响应）时跳转
        const FALLBACK_URL = 'https://cy-dogear.github.io/dot2dot/helpme.md';
        
        // 检测超时时间 (毫秒) —— 主服务器若 3.5 秒内无有效反馈则视为异常
        const TIMEOUT_MS = 3500;
        
        // 额外策略: 即使状态码是 200~299 但页面内容完全异常也可降级(可选)
        // 但绝大多数场景下，只要服务器可达且返回成功状态码就认为主站正常。
        // 为了更贴合 “服务器反馈异常” 场景，我们会检测:
        // 1) fetch 网络错误 / 超时
        // 2) 响应状态码不是 2xx (尤其 404/500/502 等)
        // 3) 可选: 响应内容极短或明显不是登录页特征？ 但为了避免误判，先基于状态码+网络。
        // 另外主站根路径可能会重定向到 /login 或返回200，只要连通且状态正常即重定向至 PRIMARY_URL。
        // -------------------------------------------------------------

        let isRedirectTriggered = false;   // 防止重复跳转
        const statusTextEl = document.getElementById('statusText');
        const spinnerEl = document.getElementById('loadingSpinner');
        const detailHintEl = document.getElementById('detailHint');

        function updateUI(message, isError = false, detailMsg = '') {
            if (statusTextEl) statusTextEl.innerText = message;
            if (detailHintEl && detailMsg) detailHintEl.innerText = detailMsg;
            if (isError && spinnerEl) {
                // 异常时去掉 spinner，让用户知道检测结束
                spinnerEl.style.display = 'none';
            }
        }

        function redirectTo(url, isFallback = false) {
            if (isRedirectTriggered) return;
            isRedirectTriggered = true;
            
            // 微UI提示：即将跳转
            if (spinnerEl) spinnerEl.style.display = 'none';
            if (statusTextEl) {
                statusTextEl.innerText = isFallback ? '↻ 主站异常，转向帮助页面 ……' : '✓ 服务器在线，正在跳转登录页 ……';
            }
            if (detailHintEl) {
                detailHintEl.innerText = isFallback ? '重定向至备用的说明文档' : '即将打开 Dot2Dot 入口';
            }
            
            // 执行跳转
            setTimeout(() => {
                window.location.href = url;
            }, 80);
        }

        // 核心检测逻辑：判断主服务器是否「反馈异常」
        async function testPrimaryServer() {
            // 注意：为了兼容跨域以及避免复杂 OPTIONS 预检，我们使用 no-cors 模式？但 no-cors 无法读取状态码。
            // 需要精确获取 HTTP 状态码来判断是否「异常」(404/500/超时等)，因此使用带超时的普通 fetch (mode: 'cors')。
            // 主服务器如果支持 CORS 最好；如果不支持，fetch 可能会因为 CORS 报错变成 opaque，但我们可以利用信号+超时。
            // 但实际上，即使 CORS 失败也会进入 catch，视为异常。符合「服务器反馈异常」要求。
            // 另外为了更准确，我们发送一个 HEAD 请求或 GET 请求，只验证响应是否 ok。
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), TIMEOUT_MS);
            
            try {
                // 发送 GET 请求，只关心服务器是否能返回正常的 HTTP 响应 (状态码 2xx 或 3xx 都认为可达)
                // 注意：主站根路径可能会返回 200 (登录页) 或 302 (重定向到 /login)，这些都属于正常。
                const response = await fetch(PRIMARY_URL, {
                    method: 'GET',
                    signal: controller.signal,
                    cache: 'no-store',
                    headers: {
                        'Cache-Control': 'no-cache',
                        'Pragma': 'no-cache'
                    }
                });
                clearTimeout(timeoutId);
                
                // 如果响应状态码是 2xx 或 3xx (重定向类) 表示服务器正常
                if (response.ok || (response.status >= 200 && response.status < 400)) {
                    // 服务器反馈正常 (非异常)
                    updateUI('✅ 主服务器可达，正在进入 Dot2Dot …', false, '服务器状态良好，即将跳转');
                    redirectTo(PRIMARY_URL, false);
                    return true;
                } else {
                    // 状态码异常 (404, 500, 502, 403 等) -> 视为服务器反馈异常
                    updateUI(`⚠️ 主服务器异常 (HTTP ${response.status})`, true, `将转向备用帮助页`);
                    redirectTo(FALLBACK_URL, true);
                    return false;
                }
            } catch (err) {
                clearTimeout(timeoutId);
                let errorMsg = '连接失败';
                if (err.name === 'AbortError') {
                    errorMsg = '主服务器响应超时';
                } else if (err.message) {
                    errorMsg = err.message;
                }
                // 网络错误、CORS 受阻、DNS解析失败等情况均视为“服务器反馈异常”
                updateUI(`⚠️ 无法连接主服务器 (${errorMsg})`, true, `网络/服务异常，跳转至帮助页面`);
                redirectTo(FALLBACK_URL, true);
                return false;
            }
        }

        // 启动检测 (延迟极短时间确保UI渲染)
        setTimeout(() => {
            testPrimaryServer().catch(() => {
                // 终极降级 (理论上上面 catch 已经处理)
                if (!isRedirectTriggered) {
                    redirectTo(FALLBACK_URL, true);
                }
            });
        }, 20);
    })();
</script>
</body>
</html>
