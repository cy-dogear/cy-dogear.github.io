<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Dot2Dot Checking...</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f7f6f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
        }
        .container { text-align: center; padding: 2rem; }
        .big-text { font-size: 3rem; font-weight: 600; color: #2c5f2d; }
        .countdown { font-size: 1.2rem; color: #666; margin-top: 1rem; }
        .status { font-size: 0.9rem; color: #999; margin-top: 1rem; }
        .retry-info { font-size: 0.85rem; color: #c0392b; margin-top: 0.5rem; }
    </style>

    <!-- ========== SEO / 机器检索增强 ========== -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <meta name="description" content="Dot2Dot - email-based connection platform for meaningful friendship. AI-algorithmic social media for authentic relationships.">
    <meta name="keywords" content="Dot2Dot, meaningful friendship, email connection, social media, AI algorithm, friendship platform">
    <meta name="language" content="en">
    <meta name="author" content="Dot2Dot">
    
    <!-- 结构化数据（Google/Bing 优先读取） -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Dot2Dot",
      "url": "https://cy-dogear.github.io/dot2dot/",
      "description": "email-based connection for meaningful friendship. AI-algorithmic social media platform.",
      "keywords": "meaningful friendship, email connection, AI social media",
      "inLanguage": "en"
    }
    </script>
    <!-- ========== SEO 增强结束 ========== -->
     
</head>
<body>
    <div class="container">
        <div class="big-text">⏳ 检测中...</div>
        <div class="countdown">正在确认目标服务状态</div>
        <div class="status" id="status"></div>
        <div class="retry-info" id="retryInfo"></div>
        <br>
        <a id="directReload" rel="noopener noreferrer" >☞ Manual Reset</a><br>
        <a>or</a><br>
        <a href="https://cy-dogear.github.io/dot2dot/helpme.html" rel="noopener noreferrer" >☞ Goto Help</a>
    </div>

    <script>
        // ==================== 全局配置 ====================
        const URL_1ST = 'http://xaa83d83.natappfree.cc';
        const URL_2ND = 'https://cy-dogear.github.io/dot2dot/helpme.html';
        const URL_3RD = './index.html';

        const VERIFY_1 = 'not found';
        const VERIFY_2 = 'Dot2Dot-Login-Page-Check';
        
        const FETCH_TIMEOUT = 5000;      // 5秒超时
        const RETRY_DELAY = 4000;        // 重试间隔

        // ==================== 配置结束 ====================

        const statusEl = document.getElementById('status');
        const retryInfoEl = document.getElementById('retryInfo');
        
        function updateStatus(msg) {
            if (statusEl) statusEl.textContent = msg;
            console.log(msg);
        }
        
        function updateRetryInfo(msg) {
            if (retryInfoEl) retryInfoEl.textContent = msg;
            console.log(msg);
        }
        
        // 保存最后一次错误信息
        let lastError = '';
        
        async function checkUrl(url, verifyString) {
            updateStatus(`🔍 检测: ${url}`);
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT);
                
                const response = await fetch(url, {
                    method: 'GET',
                    signal: controller.signal,
                    cache: 'no-store'
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    lastError = `HTTP ${response.status}`;
                    updateStatus(`❌ ${lastError}`);
                    return false;
                }
                
                const html = await response.text();
                const isValid = html.includes(verifyString);
                
                if (!isValid) {
                    lastError = `未找到验证字符串 "${verifyString.substring(0, 30)}..."`;
                    updateStatus(`⚠️ ${lastError}`);
                } else {
                    updateStatus(`✅ 验证通过`);
                }
                return isValid;
                
            } catch (err) {
                if (err.name === 'AbortError') {
                    lastError = '请求超时 (5秒)';
                    updateStatus(`❌ ${lastError}`);
                } else {
                    lastError = err.message;
                    updateStatus(`❌ ${lastError}`);
                }
                return false;
            }
        }
        
        (async function() {
            const LOOP_MAX = 3;
            
            // 设置 Manual Reset 链接
            document.getElementById('directReload').href = URL_1ST;
            
            for (let loop = 0; loop < LOOP_MAX; loop++) {
                // 显示当前尝试次数
                updateRetryInfo(`🔄 尝试次数: ${loop + 1} / ${LOOP_MAX}`);
                updateStatus(`🔍 第 ${loop + 1} 次检测...`);
                
                // 检测 verify1 (not found)
                const isNotFound = await checkUrl(URL_1ST, VERIFY_1);
                if (isNotFound) {
                    updateStatus(`✅ 检测到服务异常标识，跳转备用页面`);
                    updateRetryInfo('');
                    window.location.href = URL_2ND;
                    return;
                }
                
                // 检测 verify2 (正常标识)
                const isValid = await checkUrl(URL_1ST, VERIFY_2);
                if (isValid) {
                    updateStatus(`✅ 检测到正常标识，跳转目标服务`);
                    updateRetryInfo('');
                    window.location.href = URL_1ST;
                    return;
                }
                
                // 检测失败：显示详细信息
                updateRetryInfo(`❌ 第 ${loop + 1} 次检测失败: ${lastError}`);
                
                // 如果不是最后一次，等待后继续
                if (loop < LOOP_MAX - 1) {
                    updateRetryInfo(`⚠️ You're recommended to click "Manual Reset" ... (${loop + 1}/${LOOP_MAX})`);
                    await new Promise(resolve => setTimeout(resolve, RETRY_DELAY));
                }
            }
                
            updateRetryInfo(`⚠️ You're recommended to click "Manual Reset" ... (${LOOP_MAX}/${LOOP_MAX})`);
            
            // 循环结束，所有尝试均失败，跳转 URL2之间再DELAY最后一次
            setTimeout(() => {
                window.location.href = URL_2ND;
            }, RETRY_DELAY);
        })();
    </script>
</body>
</html>
