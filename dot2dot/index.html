<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Dot2Dot Checking...</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f7f6f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
        }
        .container { text-align: center; padding: 2rem; }
        .big-text { font-size: 3rem; font-weight: 600; color: #2c5f2d; }
        .countdown { font-size: 1.2rem; color: #666; margin-top: 1rem; }
        .status { font-size: 0.9rem; color: #999; margin-top: 1rem; }
    </style>

        <!-- ========== SEO / 机器检索增强 ========== -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <meta name="description" content="Dot2Dot - email-based connection platform for meaningful friendship. AI-algorithmic social media for authentic relationships.">
    <meta name="keywords" content="Dot2Dot, meaningful friendship, email connection, social media, AI algorithm, friendship platform">
    <meta name="language" content="en">
    <meta name="author" content="Dot2Dot">
    
    <!-- 结构化数据（Google/Bing 优先读取） -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Dot2Dot",
      "url": "https://cy-dogear.github.io/dot2dot/",
      "description": "email-based connection for meaningful friendship. AI-algorithmic social media platform.",
      "keywords": "meaningful friendship, email connection, AI social media",
      "inLanguage": "en"
    }
    </script>
    <!-- ========== SEO 增强结束 ========== -->
     
</head>
<body>
    <div class="container">
        <div class="big-text">⏳ 检测中...</div>
        <div class="countdown">正在确认目标服务状态</div>
        <div class="status" id="status"></div>
        <br><a href="https://cy-dogear.github.io/dot2dot/helpme.html"  rel="noopener noreferrer" >☞ Goto Help </a>
    </div>

    <script>
        // ==================== 全局配置 ====================
        const URL_1ST = 'http://t7fea69d.natappfree.cc';
        const URL_2ND = 'https://cy-dogear.github.io/dot2dot/helpme.html';
        const URL_3RD = 'https://mcnugbhskyip.feishu.cn/wiki/AH24wD2XEi2fN3krrOLcG3vqnvh?from=from_copylink';
        
        const VERIFY_1ST = 'Dot2Dot-Login-Page-Check';
        const VERIFY_2ND = 'Dot2Dot-Help-Page-Check';
        
        
        const FETCH_TIMEOUT = 50;
        const REDIRECT_DELAY = 1500;
        // ==================== 配置结束 ====================

        const statusEl = document.getElementById('status');
        
        function updateStatus(msg) {
            if (statusEl) statusEl.textContent = msg;
            console.log(msg);
        }
        
        async function checkUrl(url, verifyString) {
            updateStatus(`🔍 检测: ${url}`);
            
            try {
                const response = await fetch(url, {
                    method: 'GET',
                    signal: AbortSignal.timeout(FETCH_TIMEOUT),
                    cache: 'no-store'
                });
                
                if (!response.ok) {
                    updateStatus(`❌ HTTP ${response.status}`);
                    return false;
                }
                
                const html = await response.text();
                const isValid = html.includes(verifyString);
                
                updateStatus(isValid ? `✅ 验证通过` : `⚠️ 未找到验证字符串`);
                return isValid;
                
            } catch (err) {
                updateStatus(`❌ ${err.name === 'TimeoutError' ? '超时' : err.message}`);
                return false;
            }
        }
        
        (async function() {

            let targetUrl = URL_1ST;
                        
            setTimeout(() => {
                if (targetUrl) {
                    window.location.href = targetUrl;
                } else {
                    updateStatus('💀 所有服务均不可用');
                    statusEl.style.color = '#c0392b';
                }
            }, REDIRECT_DELAY);
        })();
    </script>
</body>
</html>
