<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>跳转中...</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f7f6f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .big-text {
            font-size: 3.2rem;
            font-weight: 600;
            color: #2c5f2d;
            margin-bottom: 1rem;
        }
        .countdown {
            font-size: 1.2rem;
            color: #666;
            margin-top: 1rem;
        }
        @media (max-width: 480px) {
            .big-text { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="big-text">即将跳转</div>
        <div class="countdown">请稍候 <span id="counter">10</span> 秒</div>
    </div>

    <script>
        (function() {
            const PRIMARY_URL = 'http://m3783e46.natappfree.cc';
            const FALLBACK_URL = 'https://cy-dogear.github.io/dot2dot/helpme.html';
            const DELAY_MS = 10000;
            const FETCH_TIMEOUT_MS = 5000;

            let redirected = false;
            let countdown = 10;
            const counterEl = document.getElementById('counter');

            // 倒计时显示
            const timer = setInterval(() => {
                countdown--;
                if (counterEl) counterEl.textContent = countdown;
                if (countdown <= 0) clearInterval(timer);
            }, 1000);

            function doRedirect(url) {
                if (redirected) return;
                redirected = true;
                window.location.href = url;
            }

            async function checkPrimaryServer() {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

                    const response = await fetch(PRIMARY_URL, {
                        method: 'GET',
                        signal: controller.signal,
                        cache: 'no-store'
                    });

                    clearTimeout(timeoutId);

                    // 状态码非2xx即失败
                    if (!response.ok) return false;

                    // 读取内容检测错误关键词
                    const text = await response.text();
                    const lowerText = text.toLowerCase();
                    
                    const errorKeywords = [
                        'tunnel not found',
                        'no such tunnel',
                        'bad gateway',
                        'service unavailable',
                        'connection refused',
                        '404 not found',
                        '502 bad gateway',
                        '503 service unavailable'
                    ];

                    for (const keyword of errorKeywords) {
                        if (lowerText.includes(keyword)) {
                            return false;
                        }
                    }

                    return true;
                } catch (err) {
                    return false;
                }
            }

            setTimeout(async () => {
                const isAlive = await checkPrimaryServer();
                if (isAlive) {
                    doRedirect(PRIMARY_URL);
                } else {
                    doRedirect(FALLBACK_URL);
                }
            }, DELAY_MS);
        })();
    </script>
</body>
</html>
