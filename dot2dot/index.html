<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Dot2Dot Checking...</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f7f6f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
        }
        .container { text-align: center; padding: 2rem; }
        .big-text { font-size: 3rem; font-weight: 600; color: #2c5f2d; }
        .countdown { font-size: 1.2rem; color: #666; margin-top: 1rem; }
        .status { font-size: 0.9rem; color: #999; margin-top: 1rem; }
    </style>

    <!-- ========== SEO / 机器检索增强 ========== -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <meta name="description" content="Dot2Dot - email-based connection platform for meaningful friendship. AI-algorithmic social media for authentic relationships.">
    <meta name="keywords" content="Dot2Dot, meaningful friendship, email connection, social media, AI algorithm, friendship platform">
    <meta name="language" content="en">
    <meta name="author" content="Dot2Dot">
    
    <!-- 结构化数据（Google/Bing 优先读取） -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Dot2Dot",
      "url": "https://cy-dogear.github.io/dot2dot/",
      "description": "email-based connection for meaningful friendship. AI-algorithmic social media platform.",
      "keywords": "meaningful friendship, email connection, AI social media",
      "inLanguage": "en"
    }
    </script>
    <!-- ========== SEO 增强结束 ========== -->
     
</head>
<body>
    <div class="container">
        <div class="big-text">⏳ 检测中...</div>
        <div class="countdown">正在确认目标服务状态</div>
        <div class="status" id="status"></div>
        <br>
        <a href="https://cy-dogear.github.io/dot2dot/helpme.html" rel="noopener noreferrer" style="text-decoration: none;">☞ Goto Help</a>
        <br>
        <a id="directReload" rel="noopener noreferrer" style="text-decoration: none;">☞ Direct Reload</a>
    
    </div>

    <script>
        // ==================== 全局配置 ====================
        const URL_1ST = 'http://t7fea69d.natappfree.cc';
        const URL_2ND = 'https://cy-dogear.github.io/dot2dot/helpme.html';
        const URL_3RD = 'https://cy-dogear.github.io/dot2dot/index.html';

        const VERIFY_1 = 'not found';
        const VERIFY_2 = 'Dot2Dot-Login-Page-Check';
        
        const FETCH_TIMEOUT = 5000;      // 5秒超时
        const REDIRECT_DELAY = 1500;     // 1.5秒后跳转

        document.getElementById('directReload').href = URL_1ST;

        // ==================== 配置结束 ====================

        const statusEl = document.getElementById('status');
        
        function updateStatus(msg) {
            if (statusEl) statusEl.textContent = msg;
            console.log(msg);
        }
        
        async function checkUrl(url, verifyString) {
            updateStatus(`🔍 检测: ${url}`);
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT);
                
                const response = await fetch(url, {
                    method: 'GET',
                    signal: controller.signal,
                    cache: 'no-store'
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    updateStatus(`❌ HTTP ${response.status}`);
                    return false;
                }
                
                const html = await response.text();
                const isValid = html.includes(verifyString);
                
                updateStatus(isValid ? `✅ 验证通过` : `⚠️ 未找到验证字符串`);
                return isValid;
                
            } catch (err) {
                if (err.name === 'AbortError') {
                    updateStatus(`❌ 超时`);
                } else {
                    updateStatus(`❌ ${err.message}`);
                }
                return false;
            }
        }
        
        (async function() {
            // 限制循环次数检查（必须在 targetUrl 声明之前）
            let loopCount = parseInt(sessionStorage.getItem('dot2dot_loop') || '0');
            if (loopCount >= 1) {
                updateStatus(`⚠️ 已达循环上限 (${loopCount}/2)，跳转备用地址`);
                sessionStorage.removeItem('dot2dot_loop');
                setTimeout(() => {
                    window.location.href = URL_3RD;
                }, REDIRECT_DELAY);
                return;  // 退出，不继续执行
            }
            
            let targetUrl = null;
            
            if (await checkUrl(URL_1ST, VERIFY_1)) {
                targetUrl = URL_2ND;
            } else if (await checkUrl(URL_1ST, VERIFY_2)) {
                targetUrl = URL_1ST;
            } else {
                // 循环计数：只有进入兜底分支时才累加
                sessionStorage.setItem('dot2dot_loop', loopCount + 1);
                targetUrl = URL_3RD;
            }

            // 延迟跳转，让用户看到检测结果
            setTimeout(() => {
                if (targetUrl) {
                    window.location.href = targetUrl;
                } else {
                    updateStatus('💀 所有服务均不可用');
                    if (statusEl) statusEl.style.color = '#c0392b';
                }
            }, REDIRECT_DELAY);
        })();
    </script>
</body>
</html>
