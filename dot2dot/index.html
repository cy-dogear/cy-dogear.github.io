<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Dot2Dot Checking...</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f7f6f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
        }
        .container { text-align: center; padding: 2rem; }
        .big-text { font-size: 3rem; font-weight: 600; color: #2c5f2d; }
        .countdown { font-size: 1.2rem; color: #666; margin-top: 1rem; }
        .status { font-size: 0.9rem; color: #999; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="big-text">⏳ 检测中...</div>
        <div class="countdown">正在确认目标服务状态</div>
        <div class="status" id="status"></div>
    </div>

    <script>
        // ==================== 全局配置变量 ====================
        // 第1优先级：主站完整地址
        const URL_1ST = 'http://t7fea69d.natappfree.cc';
        
        // 第2优先级：备用地址
        const URL_2ND = 'https://cy-dogear.github.io/dot2dot/helpme.html';
        
        // 第3优先级：最终备用地址（当1st和2nd都不可用时）
        const URL_3RD = 'https://www.baidu.com';
        
        // 检查 HTML 中的特定文本特征（核心判断依据）
        // 只要响应体中包含此字符串，即认为主站可用
        const CHECK_CHARACTER = 'Dot2Dot';
        
        // 超时时间（毫秒）
        const FETCH_TIMEOUT = 5000;
        
        // 跳转前的等待时间（毫秒），让用户看到检测结果
        const REDIRECT_DELAY = 1500;
        // ==================== 配置结束 ====================

        const statusEl = document.getElementById('status');
        
        function updateStatus(msg, isError = false) {
            if (statusEl) {
                statusEl.textContent = msg;
                if (isError) {
                    statusEl.style.color = '#c0392b';
                } else {
                    statusEl.style.color = '#999';
                }
            }
            console.log(msg);
        }
        
        /**
         * 检测单个URL是否可用
         * @param {string} url 要检测的URL
         * @returns {Promise<boolean>} 是否可用（响应体包含 CHECK_CHARACTER）
         */
        async function checkUrl(url) {
            try {
                // 使用 AbortSignal.timeout 简化超时逻辑
                const response = await fetch(url, {
                    method: 'GET',
                    signal: AbortSignal.timeout(FETCH_TIMEOUT),
                    cache: 'no-store'
                });
                
                if (!response.ok) {
                    updateStatus(`❌ HTTP ${response.status}: ${url}`);
                    return false;
                }
                
                const html = await response.text();
                
                // 检查是否包含指定特征字符串
                const isValid = html.includes(CHECK_CHARACTER);
                
                if (isValid) {
                    updateStatus(`✅ 验证通过: ${url}`);
                } else {
                    updateStatus(`⚠️ 响应中未找到特征字符串 "${CHECK_CHARACTER}"`);
                }
                
                return isValid;
                
            } catch (err) {
                // 区分超时错误和其他网络错误
                if (err.name === 'TimeoutError') {
                    updateStatus(`⏰ 超时: ${url}`);
                } else {
                    updateStatus(`❌ 连接失败: ${err.message}`);
                }
                return false;
            }
        }
        
        /**
         * 主检测逻辑：按优先级依次检测
         * @returns {Promise<string|null>} 可用的URL，若全不可用返回null
         */
        async function findAvailableUrl() {
            // 检测第一个URL
            updateStatus(`🔍 正在探测主站: ${URL_1ST}`);
            if (await checkUrl(URL_1ST)) {
                return URL_1ST;
            }
            
            // 第一个不可用，检测第二个
            updateStatus(`🔍 主站不可用，尝试备用: ${URL_2ND}`);
            if (await checkUrl(URL_2ND)) {
                return URL_2ND;
            }
            
            // 第二个也不可用，尝试第三个
            updateStatus(`🔍 备用站不可用，尝试最终备用: ${URL_3RD}`);
            if (await checkUrl(URL_3RD)) {
                return URL_3RD;
            }
            
            // 全部不可用
            return null;
        }
        
        // 执行检测并跳转
        (async function() {
            const availableUrl = await findAvailableUrl();
            
            setTimeout(() => {
                if (availableUrl) {
                    updateStatus(`🚀 即将跳转到: ${availableUrl}`);
                    window.location.href = availableUrl;
                } else {
                    updateStatus(`💀 所有服务均不可用，请检查网络或联系管理员`, true);
                    // 可选：在控制台输出详细信息
                    console.error('检测失败: 所有URL均不可用');
                    console.error('URL_1ST:', URL_1ST);
                    console.error('URL_2ND:', URL_2ND);
                    console.error('URL_3RD:', URL_3RD);
                    console.error('CHECK_CHARACTER:', CHECK_CHARACTER);
                }
            }, REDIRECT_DELAY);
        })();
    </script>
</body>
</html>
