<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Dot2Dot Checking...</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #f7f6f2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, sans-serif;
        }
        .container { text-align: center; padding: 2rem; }
        .big-text { font-size: 3rem; font-weight: 600; color: #2c5f2d; }
        .countdown { font-size: 1.2rem; color: #666; margin-top: 1rem; }
        .status { font-size: 0.9rem; color: #999; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="big-text">⏳ 检测中...</div>
        <div class="countdown">正在确认目标服务状态</div>
        <div class="status" id="status"></div>
    </div>

    <script>
        (function() {
            const PRIMARY_URL = 't7fea69d.natappfree.cc';
            const FALLBACK_URL = 'https://cy-dogear.github.io/dot2dot/helpme.html';
            const FETCH_TIMEOUT = 5000;
            
            // login.html 的特征指纹
            const EXPECTED_FINGERPRINTS = [
                '<title>Dot2Dot · 登录</title>',
                '<h1>Dot2Dot</h1>',
                '找得到点对点的连接，看得见精神生活内容',
                'Login / Register',
                'Visitor Mode'
            ];
            
            const statusEl = document.getElementById('status');
            
            function updateStatus(msg) {
                if (statusEl) statusEl.textContent = msg;
                console.log(msg);
            }
            
            async function verifyPrimaryServer() {
                updateStatus('🔍 正在探测主站...');
                
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT);
                    
                    const response = await fetch(PRIMARY_URL, {
                        method: 'GET',
                        signal: controller.signal,
                        cache: 'no-store'
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) {
                        updateStatus(`❌ HTTP 错误: ${response.status}`);
                        return false;
                    }
                    
                    const html = await response.text();
                    let matchCount = 0;
                    
                    for (const fingerprint of EXPECTED_FINGERPRINTS) {
                        if (html.includes(fingerprint)) {
                            matchCount++;
                        }
                    }
                    
                    updateStatus(`📊 特征匹配: ${matchCount}/${EXPECTED_FINGERPRINTS.length}`);
                    
                    // 至少匹配 3 个特征才认为是真正的 login.html
                    const isValid = matchCount >= 3;
                    
                    if (isValid) {
                        updateStatus('✅ 主站验证通过，即将跳转');
                    } else {
                        updateStatus('⚠️ 主站响应异常（非预期内容），转向备用');
                    }
                    
                    return isValid;
                    
                } catch (err) {
                    updateStatus(`❌ 连接失败: ${err.message}`);
                    return false;
                }
            }
            
            // 立即检测并跳转（不加延迟，因为用户等不了太久）
            verifyPrimaryServer().then(isValid => {
                setTimeout(() => {
                    if (isValid) {
                        window.location.href = PRIMARY_URL;
                    } else {
                        window.location.href = FALLBACK_URL;
                    }
                }, 1500); // 留 1.5 秒让用户看到检测结果
            });
        })();
    </script>
</body>
</html>
